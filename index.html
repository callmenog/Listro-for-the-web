<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Listro OS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="boot-screen">
  <div id="boot-logo">Listro <b>OS</b></div>
  <div id="boot-dots"><span></span><span></span><span></span></div>
</div>

<div id="desktop">
  <div id="desktop-icons"></div>
  <div id="windows-container"></div>

  <div id="taskbar">
    <button id="start-button"></button>
    <div id="start-menu" class="hidden"></div>
    <div id="task-list"></div>
    <div id="systray"><span id="clock">--:--</span></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
